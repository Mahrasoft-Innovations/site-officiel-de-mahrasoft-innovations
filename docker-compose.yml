# =============================================================
# docker-compose.yml — mahrasoft.com
# /root/site-officiel-de-mahrasoft-innovations/docker-compose.yml
#
# Dépend du réseau externe créé par /root/docker-compose.yml
# Lancer après : docker compose -f /root/docker-compose.yml up -d
# =============================================================

services:

  # ============================================================
  # BASE DE DONNÉES — mahrasoft.com
  # ============================================================
  mahrasoft-db:
    image: postgres:16-alpine
    container_name: mahrasoft-db
    restart: always
    environment:
      POSTGRES_USER:        ${MAHRASOFT_DB_USER:-mahrasoft_user}
      POSTGRES_PASSWORD:    ${MAHRASOFT_DB_PASSWORD}
      POSTGRES_DB:          ${MAHRASOFT_DB_NAME:-mahrasoft_db}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
      TZ:                   Africa/Ndjamena
      PGDATA:               /var/lib/postgresql/data/pgdata

    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "0.5"
        reservations:
          memory: 256M
          cpus: "0.1"

    volumes:
      - /mnt/storage/docker/mahrasoft/postgres:/var/lib/postgresql/data:rw
      - /home/ubuntu/backup-mahrasoft:/backup:rw

    expose:
      - "5432"

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${MAHRASOFT_DB_USER:-mahrasoft_user} -d ${MAHRASOFT_DB_NAME:-mahrasoft_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

    # DB interne uniquement — pas sur le réseau partagé
    networks:
      - mahrasoft-internal

    shm_size: 256mb

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================================
  # APPLICATION FastAPI — mahrasoft.com (port 8000)
  # ============================================================
  mahrasoft-backend:
    build:
      context: ./Backend
      dockerfile: build/Dockerfile
    container_name: mahrasoft-backend
    restart: unless-stopped

    environment:
      ENVIRONMENT:             ${MAHRASOFT_ENV:-production}
      APP_DEBUG:               ${MAHRASOFT_DEBUG:-False}
      APP_PORT:                8000
      NB_WORKERS:              ${MAHRASOFT_WORKERS:-2}
      PYTHONUNBUFFERED:        "1"
      PYTHONDONTWRITEBYTECODE: "1"
      TZ:                      Africa/Ndjamena
      LOG_LEVEL:               info
      PAGE_CACHE_TTL:          3600
      ENABLE_PAGE_CACHE:       "True"
      SECRET_KEY:              ${MAHRASOFT_SECRET_KEY}
      POSTGRES_USER:           ${MAHRASOFT_DB_USER:-mahrasoft_user}
      POSTGRES_PASSWORD:       ${MAHRASOFT_DB_PASSWORD}
      POSTGRES_DB:             ${MAHRASOFT_DB_NAME:-mahrasoft_db}
      DB_HOST:                 mahrasoft-db
      DB_PORT:                 5432
      DATABASE_URL:            postgresql+asyncpg://${MAHRASOFT_DB_USER:-mahrasoft_user}:${MAHRASOFT_DB_PASSWORD}@mahrasoft-db:5432/${MAHRASOFT_DB_NAME:-mahrasoft_db}
      DATABASE_URL_SYNC:       postgresql://${MAHRASOFT_DB_USER:-mahrasoft_user}:${MAHRASOFT_DB_PASSWORD}@mahrasoft-db:5432/${MAHRASOFT_DB_NAME:-mahrasoft_db}

    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "1.0"
        reservations:
          memory: 512M
          cpus: "0.25"

    volumes:
      - /mnt/storage/docker/mahrasoft/uploads:/mahrasoft-app/uploads:rw
      - /mnt/storage/docker/mahrasoft/static:/mahrasoft-app/static:rw
      - /mnt/storage/docker/mahrasoft/temp:/mahrasoft-app/temp:rw
      - /mnt/storage/docker/mahrasoft/logs:/mahrasoft-app/logs:rw
      - /dev/shm:/dev/shm

    expose:
      - "8000"

    depends_on:
      mahrasoft-db:
        condition: service_healthy

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

    networks:
      - mahrasoft-internal   # accès DB
      - multisite-network    # accès Nginx

    ulimits:
      nofile:
        soft: 65536
        hard: 65536

    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

# ============================================================
# RÉSEAU INTERNE (DB ↔ App uniquement)
# ============================================================
networks:
  mahrasoft-internal:
    driver: bridge
    name: mahrasoft-internal
    ipam:
      config:
        - subnet: 172.31.0.0/24

  # Réseau partagé externe — créé par /root/docker-compose.yml
  multisite-network:
    external: true
    name: multisite-network