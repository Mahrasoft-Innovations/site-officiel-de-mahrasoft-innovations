# =============================================================
# docker-compose.yml — mahrasoft.com
# /root/site-officiel-de-mahrasoft-innovations/docker-compose.yml
#
# App FastAPI sans base de données
# Dépend du réseau externe créé par /root/docker-compose.yml
# =============================================================

services:

  mahrasoft-backend:
    build:
      context: ./Backend
      dockerfile: build/Dockerfile
    container_name: mahrasoft-backend
    restart: unless-stopped

    environment:
      # Variables lues depuis .env — noms originaux du projet
      ENVIRONMENT:      ${ENVIRONMENT:-production}
      APP_DEBUG:        ${APP_DEBUG:-False}
      APP_PORT:         8000
      NB_WORKERS:       ${NB_WORKERS:-2}
      LOG_LEVEL:        ${LOG_LEVEL:-info}
      TZ:               Africa/Ndjamena
      PYTHONUNBUFFERED: "1"
      PYTHONDONTWRITEBYTECODE: "1"

      # App
      APP_NAME:         ${APP_NAME:-Mahrasoft.com}
      APP_VERSION:      ${APP_VERSION:-1.0.0}
      BASE_URL:         ${BASE_URL:-https://mahrasoft.com}
      DOMAIN:           ${DOMAIN:-mahrasoft.com}
      SECRET_KEY:       ${SECRET_KEY}

      # CORS
      ALLOWED_ORIGINS:  ${ALLOWED_ORIGINS:-https://mahrasoft.com,https://www.mahrasoft.com}
      CORS_ORIGINS:     ${CORS_ORIGINS:-https://mahrasoft.com,https://www.mahrasoft.com}
      CORS_CREDENTIALS: ${CORS_CREDENTIALS:-true}

      # Email
      SMTP_HOST:        ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT:        ${SMTP_PORT:-587}
      SMTP_USER:        ${SMTP_USER:-}
      SMTP_PASSWORD:    ${SMTP_PASSWORD:-}
      SMTP_FROM:        ${SMTP_FROM:-}

      # Stockage
      UPLOAD_DIR:       ${UPLOAD_DIR:-/mahrasoft-app/uploads}
      STATIC_DIR:       ${STATIC_DIR:-/mahrasoft-app/static}
      MAX_UPLOAD_SIZE:  ${MAX_UPLOAD_SIZE:-10485760}

      # Cache
      PAGE_CACHE_TTL:   3600
      ENABLE_PAGE_CACHE: "True"

    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
        reservations:
          memory: 256M
          cpus: "0.25"

    volumes:
      - /mnt/storage/docker/mahrasoft/uploads:/mahrasoft-app/uploads:rw
      - /mnt/storage/docker/mahrasoft/static:/mahrasoft-app/static:rw
      - /mnt/storage/docker/mahrasoft/temp:/mahrasoft-app/temp:rw
      - /mnt/storage/docker/mahrasoft/logs:/mahrasoft-app/logs:rw
      - /dev/shm:/dev/shm

    expose:
      - "8000"

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

    networks:
      - multisite-network

    ulimits:
      nofile:
        soft: 65536
        hard: 65536

    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

# ============================================================
# RÉSEAU — partagé externe (créé par /root/docker-compose.yml)
# ============================================================
networks:
  multisite-network:
    external: true
    name: multisite-network